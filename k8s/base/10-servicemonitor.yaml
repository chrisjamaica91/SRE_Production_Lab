apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: sre-lab-api-monitor
  namespace: production
  labels:
    app: sre-lab-api
spec:
  selector:
    matchLabels:
      app: sre-lab-api  # Must match your Service labels
  endpoints:
  - port: http          # Must match port name in your Service
    interval: 30s       # Scrape every 30 seconds
    path: /metrics      # Path to scrape