apiVersion: apps/v1
kind: Deployment
metadata:
  name: sre-lab-api
  namespace: production
  labels:
    app: sre-lab-api
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: sre-lab-api
  template:
    metadata:
      labels:
        app: sre-lab-api
        version: v1
    spec:
      containers:
      - name: api
        image: chrisjamaica104/sre-lab-api:cfbb277
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
          protocol: TCP
        envFrom:
        - configMapRef:
            name: sre-lab-config
        - secretRef:
            name: sre-lab-secret
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        securityContext:
          runAsNonRoot: true
          runAsUser: 1001
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL