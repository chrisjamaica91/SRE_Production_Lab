apiVersion: v1
kind: Service
metadata:
  name: sre-lab-api
  namespace: production
  labels:
    app: sre-lab-api
  annotations:
    blue-green/active-version: "blue"  # For documentation/tracking
spec:
  type: ClusterIP
  selector:
    app: sre-lab-api
    version: blue  # THIS IS THE KEY - only route to blue pods
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3000
    name: http