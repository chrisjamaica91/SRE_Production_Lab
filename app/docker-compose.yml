version: "3.8"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: sre-lab-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: srelab
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sre-lab-network

  # Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sre-lab-api
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: srelab
      DB_USER: postgres
      DB_PASSWORD: postgres
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sre-lab-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  sre-lab-network:
    driver: bridge
