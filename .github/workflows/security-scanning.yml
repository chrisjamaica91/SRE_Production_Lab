name: Security Scanning Suite

# When to run
on:
  push:
    branches: [ main, staging, develop ]
  pull_request:
    branches: [ main, staging ]
  # Run daily at 2 AM UTC to catch new CVEs
  schedule:
    - cron: '0 2 * * *'
  workflow_call:
    # Allow this workflow to be called by other workflows (like ci-cd.yml)
    # No inputs needed for now, but you could add parameters if you want

# Required for uploading security scan results
permissions:
  contents: read
  security-events: write
  issues: write
  pull-requests: write

jobs:
  # ============================================================================
  # BRANCH DETECTION: Determine which scans to run
  # ============================================================================
  detect-environment:
    name: Detect Branch & Set Scan Level
    runs-on: ubuntu-latest
    outputs:
      run-fast: ${{ steps.check.outputs.run-fast }}
      run-comprehensive: ${{ steps.check.outputs.run-comprehensive }}
      run-full: ${{ steps.check.outputs.run-full }}
      environment: ${{ steps.check.outputs.environment }}
    steps:
      - name: Determine scan level
        id: check
        run: |
          echo "Branch: ${{ github.ref }}"
          
          if [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
            echo "🚀 DEVELOP branch: Running FAST scans only (2-3 min)"
            echo "run-fast=true" >> $GITHUB_OUTPUT
            echo "run-comprehensive=false" >> $GITHUB_OUTPUT
            echo "run-full=false" >> $GITHUB_OUTPUT
            echo "environment=development" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/staging" ]]; then
            echo "🔍 STAGING branch: Running COMPREHENSIVE scans (8-10 min)"
            echo "run-fast=true" >> $GITHUB_OUTPUT
            echo "run-comprehensive=true" >> $GITHUB_OUTPUT
            echo "run-full=false" >> $GITHUB_OUTPUT
            echo "environment=staging" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "🛡️ MAIN branch: Running FULL scans (15-20 min)"
            echo "run-fast=true" >> $GITHUB_OUTPUT
            echo "run-comprehensive=true" >> $GITHUB_OUTPUT
            echo "run-full=true" >> $GITHUB_OUTPUT
            echo "environment=production" >> $GITHUB_OUTPUT
          else
            echo "📝 Feature branch: Running FAST scans only"
            echo "run-fast=true" >> $GITHUB_OUTPUT
            echo "run-comprehensive=false" >> $GITHUB_OUTPUT
            echo "run-full=false" >> $GITHUB_OUTPUT
            echo "environment=feature" >> $GITHUB_OUTPUT
          fi
    
  # ============================================================================
  # Job 1: Secret Scanning
  # ============================================================================
  secret-scanning:
    name: Secret Scanning (gitleaks)
    runs-on: ubuntu-latest
    needs: detect-environment
    if: needs.detect-environment.outputs.run-fast == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Full history for gitleaks
      
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================================
  # Job 2: SAST - Static Application Security Testing
  # ============================================================================
  sast-scanning:
    name: SAST Scanning (Semgrep)
    runs-on: ubuntu-latest
    needs: detect-environment
    if: needs.detect-environment.outputs.run-fast == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          # Semgrep rulesets to use
          config: >-
            p/security-audit
            p/owasp-top-ten
            p/nodejs
            p/javascript
            p/docker
          # Generate SARIF report for GitHub Security tab
          generateSarif: true
        env:
          # Semgrep App token (optional - for private rules)
          # SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
      
      # Upload results to GitHub Security tab
      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v2
        if: always()  # Upload even if Semgrep finds issues
        with:
          sarif_file: semgrep.sarif
      
      # Fail on high-severity findings
      - name: Check for critical/high severity findings
        if: failure()
        run: |
          echo "❌ SAST scan found security issues!"
          echo "Check the Security tab for details"
          exit 1

  # ============================================================================
  # Job 3: SCA - Software Composition Analysis
  # ============================================================================
  dependency-scanning:
    name: Dependency Scanning (npm audit + Snyk)
    runs-on: ubuntu-latest
    needs: detect-environment
    if: needs.detect-environment.outputs.run-fast == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json
      
      # Fast built-in scan
      - name: Run npm audit
        working-directory: ./app
        run: |
          echo "Running npm audit..."
          npm audit --audit-level=high --json > npm-audit-results.json || true
          
          # Display results
          cat npm-audit-results.json | jq '.metadata'
          
          # Fail on high/critical vulnerabilities
          VULNERABILITIES=$(cat npm-audit-results.json | jq '.metadata.vulnerabilities.high + .metadata.vulnerabilities.critical')
          
          if [ "$VULNERABILITIES" -gt 0 ]; then
            echo "❌ Found $VULNERABILITIES high/critical vulnerabilities"
            npm audit --audit-level=high
            exit 1
          else
            echo "✅ No high/critical vulnerabilities found"
          fi
      
      # More comprehensive scan with Snyk
      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/node@master
        continue-on-error: true  # Don't fail build, just report
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --file=app/package.json
      
      # Upload results
      - name: Upload npm audit results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: npm-audit-results
          path: app/npm-audit-results.json

  # ============================================================================
  # Job 4: Container Image Scanning
  # ============================================================================
  container-scanning:
    name: Container Scanning (Trivy)
    runs-on: ubuntu-latest
    needs: detect-environment
    if: needs.detect-environment.outputs.run-comprehensive == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Build Docker image for scanning
        run: |
          docker build -t sre-lab-api:${{ github.sha }} ./app
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'sre-lab-api:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          # Scan for OS packages, app dependencies, and misconfigurations
          scanners: 'vuln,secret,config'
          # Exit code based on severity
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          # Ignore unfixed vulnerabilities (can't patch yet)
          ignore-unfixed: true
      
      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
      
      # Generate human-readable report for artifacts
      - name: Generate detailed Trivy report
        uses: aquasecurity/trivy-action@master
        if: always()
        with:
          image-ref: 'sre-lab-api:${{ github.sha }}'
          format: 'table'
          output: 'trivy-report.txt'
          scanners: 'vuln,secret,config'
      
      - name: Upload Trivy report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: trivy-scan-report
          path: trivy-report.txt

  # ============================================================================
  # Job 5: IaC Scanning (Terraform)
  # ============================================================================
  iac-scanning:
    name: IaC Scanning (tfsec + Checkov)
    runs-on: ubuntu-latest
    needs: detect-environment
    if: needs.detect-environment.outputs.run-comprehensive == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      # Fast scan with tfsec
      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: ./terraform
          format: sarif
          soft_fail: false  # Fail build on issues
      
      - name: Upload tfsec SARIF
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: results.sarif
      
      # Comprehensive scan with Checkov
      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: ./terraform
          framework: terraform
          output_format: sarif
          output_file_path: checkov-results.sarif
          # Fail on HIGH/CRITICAL
          soft_fail: false
      
      - name: Upload Checkov results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: checkov-results.sarif

  # ============================================================================
  # SUMMARY: Single notification with all results
  # ============================================================================
  security-summary:
    name: Security Scan Summary
    runs-on: ubuntu-latest
    needs: [detect-environment, secret-scanning, sast-scanning, dependency-scanning, container-scanning]
    if: always()  # Run even if previous jobs fail
    steps:
      - name: Check all scan results
        run: |
          echo "========================================="
          echo "Security Scan Summary"
          echo "Environment: ${{ needs.detect-environment.outputs.environment }}"
          echo "========================================="
          
          FAILED=0
          
          # Check each scan result
          if [[ "${{ needs.secret-scanning.result }}" == "failure" ]]; then
            echo "❌ Secret Scanning: FAILED"
            FAILED=1
          else
            echo "✅ Secret Scanning: PASSED"
          fi
          
          if [[ "${{ needs.sast-scanning.result }}" == "failure" ]]; then
            echo "❌ SAST Scanning: FAILED"
            FAILED=1
          else
            echo "✅ SAST Scanning: PASSED"
          fi
          
          if [[ "${{ needs.dependency-scanning.result }}" == "failure" ]]; then
            echo "❌ Dependency Scanning: FAILED"
            FAILED=1
          else
            echo "✅ Dependency Scanning: PASSED"
          fi
          
          if [[ "${{ needs.container-scanning.result }}" != "skipped" ]]; then
            if [[ "${{ needs.container-scanning.result }}" == "failure" ]]; then
              echo "❌ Container Scanning: FAILED"
              FAILED=1
            else
              echo "✅ Container Scanning: PASSED"
            fi
          else
            echo "⏭️ Container Scanning: SKIPPED (not required for this branch)"
          fi
          
          echo "========================================="
          
          if [[ $FAILED -eq 1 ]]; then
            echo "🚨 One or more security scans failed!"
            echo "Check the Security tab: https://github.com/${{ github.repository }}/security"
            exit 1
          else
            echo "🎉 All security scans passed!"
            exit 0
          fi