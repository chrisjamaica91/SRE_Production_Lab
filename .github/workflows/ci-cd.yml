name: CI/CD Pipeline

# WHEN should this workflow run?
on:
  push:
    branches:
      - develop  # Run on every push to develop branch
      - staging  # Run on every push to staging branch
      - main  # Run on every push to main branch
  pull_request:
    branches:
      - develop  # Run on every push to develop branch
      - staging  # Run on every push to staging branch
      - main  # Run on pull requests to main

# WHAT should happen?
jobs:
  # ============================================================================
  # JOB 1: SECURITY GATE - All scans must pass before building
  # ============================================================================
  security-gate:
    name: Security Checks
    uses: ./.github/workflows/security-scanning.yml
    # This calls your security-scanning.yml workflow
    # It will run the appropriate scans based on branch
    
  # ============================================================================
  # JOB 2: BUILD - Only runs if security passes
  # ============================================================================
  build-and-push:
    name: Build Docker Image
    runs-on: ubuntu-latest  # Use Ubuntu server to run this
    needs: security-gate  # Only run if security-gate job passes
    
    steps:
      # Step 1: Download your code from GitHub
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GH_PAT }}
        
      # Step 2: Set up Docker Buildx (advanced Docker builder)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        
      # Step 3: Log in to Docker Hub (using secrets)
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      # Step 4: Create a version number based on commit
      - name: Generate version tag
        id: version
        run: |
          VERSION=$(echo $GITHUB_SHA | cut -c1-7)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Generated version: $VERSION"
          
      # Step 5: Build and push Docker image
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./app  # Build from the app directory
          file: ./app/Dockerfile
          push: true  # Push to Docker Hub
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/sre-lab-api:latest
            ${{ secrets.DOCKER_USERNAME }}/sre-lab-api:${{ steps.version.outputs.VERSION }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/sre-lab-api:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/sre-lab-api:buildcache,mode=max
          
      # Step 6: Print success message
      - name: Image built successfully
        run: |
          echo "✅ Docker image built and pushed!"
          echo "Image: ${{ secrets.DOCKER_USERNAME }}/sre-lab-api:${{ steps.version.outputs.VERSION }}"

            # Step 7: Update Helm values (GitOps pattern)
      - name: Update Helm values with new image tag
        run: |
          VERSION=$(echo $GITHUB_SHA | cut -c1-7)
          echo "Updating Helm values with image tag: $VERSION"
          
          # Update image tag in values.yaml
          sed -i "s|tag:.*|tag: $VERSION|g" helm/sre-lab-api/values.yaml
          
          # Verify the change
          echo "Updated values.yaml:"
          grep -A 2 "image:" helm/sre-lab-api/values.yaml
          
      # Step 8: Commit Helm values to Git (GitOps commit)
      - name: GitOps - Commit updated values
        run: |
          VERSION=$(echo $GITHUB_SHA | cut -c1-7)
          
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          
          # Add only the values file
          git add helm/sre-lab-api/values.yaml
          
          # Commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "GitOps: Update image to version $VERSION

        Automated by CI/CD Pipeline
        Branch: ${{ github.ref_name }}
        Commit: ${{ github.sha }}
        Triggered by: ${{ github.actor }}"
                    git push
                  fi
                
      # Step 9: GitOps Summary
      - name: GitOps Summary
        run: |
          VERSION=$(echo $GITHUB_SHA | cut -c1-7)
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║           GitOps Deployment Completed                      ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          echo ""
          echo "📦 Image Built and Pushed:"
          echo "   ${{ secrets.DOCKER_USERNAME }}/sre-lab-api:$VERSION"
          echo ""
          echo "📝 Git Updated:"
          echo "   helm/sre-lab-api/values.yaml"
          echo "   Branch: ${{ github.ref_name }}"
          echo ""
          echo "🔄 Next Steps (with ArgoCD):"
          echo "   1. ArgoCD detects Git change (polls every 3 min)"
          echo "   2. ArgoCD runs: helm diff"
          echo "   3. ArgoCD runs: helm upgrade sre-lab-api ./helm/sre-lab-api"
          echo "   4. Kubernetes deploys new pods with image: $VERSION"
          echo "   5. Health checks validate deployment"
          echo "   6. Old pods terminated (blue/green rollout)"
          echo ""
          echo "📊 View deployment status:"
          echo "   https://github.com/${{ github.repository }}/actions"
          echo ""
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║  🎉 GitOps Commit Successful - Ready for ArgoCD Sync      ║"
          echo "╚════════════════════════════════════════════════════════════╝"