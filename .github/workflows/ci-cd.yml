name: CI/CD Pipeline

# WHEN should this workflow run?
on:
  push:
    branches:
      - main  # Run on every push to main branch
  pull_request:
    branches:
      - main  # Run on pull requests to main

# WHAT should happen?
jobs:
  build-and-push:
    name: Build Docker Image
    runs-on: ubuntu-latest  # Use Ubuntu server to run this
    
    steps:
      # Step 1: Download your code from GitHub
      - name: Checkout code
        uses: actions/checkout@v3
        
      # Step 2: Set up Docker Buildx (advanced Docker builder)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        
      # Step 3: Log in to Docker Hub (using secrets)
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      # Step 4: Create a version number based on commit
      - name: Generate version tag
        id: version
        run: |
          VERSION=$(echo $GITHUB_SHA | cut -c1-7)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Generated version: $VERSION"
          
      # Step 5: Build and push Docker image
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./app  # Build from the app directory
          file: ./app/Dockerfile
          push: true  # Push to Docker Hub
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/sre-lab-api:latest
            ${{ secrets.DOCKER_USERNAME }}/sre-lab-api:${{ steps.version.outputs.VERSION }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/sre-lab-api:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/sre-lab-api:buildcache,mode=max
          
      # Step 6: Print success message
      - name: Image built successfully
        run: |
          echo "✅ Docker image built and pushed!"
          echo "Image: ${{ secrets.DOCKER_USERNAME }}/sre-lab-api:${{ steps.version.outputs.VERSION }}"

      # Step 7: Update Kubernetes manifest with new image tag
      - name: Update Kubernetes manifest
        run: |
          VERSION=$(echo $GITHUB_SHA | cut -c1-7)
          sed -i "s|image: .*/sre-lab-api:.*|image: ${{ secrets.DOCKER_USERNAME }}/sre-lab-api:$VERSION|g" k8s/base/03-deployment.yaml
          cat k8s/base/03-deployment.yaml
          
      # Step 8: Commit and push updated manifest
      - name: Commit updated manifest
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add k8s/base/03-deployment.yaml
          git diff --staged --quiet || git commit -m "Update image to ${{ secrets.DOCKER_USERNAME }}/sre-lab-api:$(echo $GITHUB_SHA | cut -c1-7)"
          git push