# .github/workflows/deploy.yml (NEW SECURE WAY)
name: Deploy to AWS

on:
  push:
    branches: [main]

permissions:
  id-token: write  # ← CRITICAL! Allows workflow to request OIDC token
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::123456789:role/GitHubActionsRole  # ← The role ARN
          aws-region: us-east-1

      # Now you have temporary AWS credentials automatically!
      - name: Push to ECR
        run: |
          aws ecr get-login-password | docker login ...
          docker push ...