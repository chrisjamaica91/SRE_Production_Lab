apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.app.name }}
  namespace: {{ .Values.namespace | default "default" }}
  labels:
    app: {{ .Values.app.name }}
  annotations:
    blue-green/active-version: {{ .Values.service.activeVersion | quote }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app: {{ .Values.app.name }}
    version: {{ .Values.service.activeVersion }}  # Routes to active version
  ports:
  - protocol: TCP
    port: {{ .Values.service.port }}
    targetPort: {{ .Values.service.targetPort }}
    name: http