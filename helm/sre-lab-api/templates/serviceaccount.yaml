# Dedicated service account for the application
# Follows least privilege - separate from default
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.app.name }}-sa
  namespace: {{ .Values.namespace | default "default" }}
  labels:
    app: {{ .Values.app.name }}
# Disable automatic token mounting (security best practice)
# Only mount if app actually needs to call Kubernetes API
automountServiceAccountToken: false