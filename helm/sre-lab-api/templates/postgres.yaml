{{- if .Values.postgresql.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: {{ .Values.namespace | default "default" }}
spec:
  replicas: {{ .Values.postgresql.replicas }}
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: {{ .Values.postgresql.image }}
        securityContext:
          allowPrivilegeEscalation: false
          # nosemgrep: yaml.kubernetes.security.run-as-non-root-unsafe-value.run-as-non-root-unsafe-value
          # Justification: PostgreSQL official image requires root for data directory initialization
          # Production mitigation: Use managed AWS RDS instead of containerized PostgreSQL
          # Risk: MEDIUM - Acceptable for non-production; production uses RDS
          # Approved by: Chris | Date: 2026-03-20
          runAsNonRoot: false
          readOnlyRootFilesystem: false
        env:
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: postgres-admin-secret
              key: POSTGRES_DB
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: postgres-admin-secret
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-admin-secret
              key: POSTGRES_PASSWORD
        ports:
        - containerPort: 5432
        resources:
          {{- toYaml .Values.postgresql.resources | nindent 10 }}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: {{ .Values.namespace | default "default" }}
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432
{{- end }}